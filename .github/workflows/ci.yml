name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-compile:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Icarus Verilog
        run: sudo apt-get update && sudo apt-get install -y iverilog

      - name: Compile Verilog sources
        run: |
          find src/ -name '*.v' -exec iverilog -t null {} \; 2>&1 | head -50
          echo "Verilog syntax check complete"
